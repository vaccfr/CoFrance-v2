version = "1.0.9"
config_repo = "vaccfr/CoFrance-v2/beta"

[paths]
airline_filepath = "../../ICAO/ICAO_Airlines.txt"
ese_folderpath = "../../../"

[api_urls]
ecfmp_api_url = "https://pintade.vatsim.fr/dataplatform/api/v1/current/ecfmp/flow-measures?active_only=true&current=true"
area_api_url = "localhost:3000/api/areas/all"
oceanic_api_url = "https://nattrak.vatsim.net/api/plugins"

[oceanic_data]
brest_oceanic_entry_points = ["ETIKI", "UMLER", "SEPAL", "BUNAV", "SIVIR"]

[sector_data]
french_sectors_callsigns = [ "LF", "PA" ]
neighbor_sectors_callsigns = [ "LO", "ED", "EB", "LS", "LI", "LE", "EG" ]

[tag_layout]
lines = [
    "gs", "aspd", "scratchpad", "vz", "atyp", "hold", "eat", "coordination",
    "notification", "sequence", "lost", "stca", "tct", "\n",
    "contact_flag", "callsign", "cpdlc_flag", "comms", "manual_coord", "sector", "rfl", "group", "\n",
    "afl", "tendency", "cfl", "wpt", "ahdg", "\n",
    "xfl", "hfl", "copx", "intention", "\n",
    "cpdlc_rqst", "cpdlc_rqst_number"
]

[minimised_tag_layout]
lines = [
    "lost", "stca", "tct", "\n",
    "afl", "tendency",
]

[extended_tag_layout]
lines = [
    "vspace", "modeshdg", "modesspd", "modesmach", "modessfl", "\n",
    "vspace", "adep", "ades", "star", "arrrwy", "\n",
    "cr", "align_right", "nsfreq", "\n",
    "optext", "align_right", "afk", "\n",
    "vspace", "traj", "info", "id", "misc"
]

traj_tab = ["routewaypoints", "\n", "routerfl", "\n", "routeecl"]
info_tab = ["company", "\n", "rvsm", "radio", "rnav", "\n", "tracknbr", "cat"]
id_tab = ["callsign", "currentsquawk", "\n", "assignedsquawk"]
